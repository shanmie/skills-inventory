.chips { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; }

.chip.active { background:var(--accent); color:white; border-color:var(--accent); }
.table-shell { background:var(--panel); border:1px solid var(--line); border-radius:8px; overflow:hidden; }
table { width:100%; border-collapse:separate; border-spacing:0; table-layout:fixed; }
thead th { position:static; background:#eef2f7; color:#344054; font-size:12px; text-align:left; padding:10px; border-bottom:1px solid var(--line); }
td { vertical-align:top; padding:11px 10px; border-bottom:1px solid #edf0f5; font-size:13px; line-height:1.45; }
tr:hover td { background:#fbfcff; }
.name { font-weight:720; color:#101828; word-break:break-word; }
.source { display:inline-block; margin-top:5px; padding:2px 7px; border-radius:5px; background:#f2f4f7; color:#475467; font-size:12px; }
.cat { display:inline-block; padding:3px 8px; border-radius:5px; background:#ecfdf3; color:#027a48; font-size:12px; font-weight:650; }
.path { color:#667085; font-size:12px; word-break:break-all; margin-top:6px; }
.devices { color:#475467; font-size:12px; margin-top:6px; }
.children { color:#475467; font-size:12px; margin-top:6px; line-height:1.5; }
.count-pill { display:inline-block; margin-top:5px; padding:2px 7px; border-radius:5px; background:#eef6ff; color:#175cd3; font-size:12px; }
.conflict { display:inline-block; color:var(--warn); background:var(--warnBg); border:1px solid #fecdca; border-radius:5px; padding:2px 7px; font-size:12px; font-weight:650; }
.example { color:#344054; }
.empty { padding:32px; text-align:center; color:var(--muted); }
.footer-note { color:var(--muted); font-size:12px; margin-top:12px; }
@media (max-width: 900px) { .summary { grid-template-columns: repeat(2, minmax(0,1fr)); } .controls { grid-template-columns:1fr; } table { min-width:1120px; } .table-shell { overflow:auto; } }

function groupedRows(items, query) {
  const groups = new Map();
  for (const r of items) {
    const info = groupInfo(r);
    if (!groups.has(info.key)) groups.set(info.key, { name:info.title, category:info.category, source:'', purpose:info.purpose, scenario:info.scenario, example:info.example, children:[], installed_on:[], files:0, conflict:false, relative_path:'' });
    const g = groups.get(info.key);
    g.children.push(r);
    g.files += r.files || 0;
    g.conflict = g.conflict || !!r.conflict;
    g.installed_on = uniq(g.installed_on.concat(r.installed_on || []));
  }
  let result = Array.from(groups.values()).map(g => {
    g.source = uniq(g.children.map(c => c.source)).join(' / ');
    g.relative_path = g.children.map(c => c.name).sort().join(', ');
    g.child_count = g.children.length;
    g.search_text = [g.name,g.category,g.source,g.purpose,g.scenario,g.example,g.relative_path,g.installed_on.join(' ')].join(' ').toLowerCase();
    return g;
  });
  if (query) result = result.filter(g => g.search_text.includes(query) || g.children.some(row => rowText(row).includes(query)));
  return result.sort((a,b)=> (a.category + a.name).localeCompare(b.category + b.name,'zh-Hans-CN'));
}
function render() {

  const filtered = rows.filter(r => {
    if (cat && r.category !== cat) return false;
    if (src && r.source !== src) return false;
    if (dev && !(r.installed_on || []).includes(dev)) return false;
    if (mode.value === 'group') return true;
    if (!q) return true;
    return rowText(r).includes(q);
  });
  const visible = mode.value === 'group' ? groupedRows(filtered, q) : filtered;
  totalCount.textContent = visible.length;
  tbody.innerHTML = visible.map(r => {
    const isGroup = mode.value === 'group';
    const childNames = isGroup ? r.children.map(c => c.name).sort() : [];
    const childText = isGroup ? childNames.slice(0, 18).join(', ') + (childNames.length > 18 ? ' 等 ' + childNames.length + ' 个' : '') : '';
    return (
    '<tr>' +
    '<td><div class="name">' + esc(r.name) + '</div><span class="source">' + esc(r.source) + ' · ' + (r.files || 0) + ' 文件</span>' + (isGroup ? '<div class="count-pill">' + r.child_count + ' 个子技能</div>' : '') + (r.conflict ? '<div class="conflict">内容冲突</div>' : '') + '<div class="devices">设备：' + esc((r.installed_on || []).join(', ')) + '</div>' + (isGroup ? '<div class="children">子技能：' + esc(childText) + '</div>' : '<div class="path">' + esc(r.relative_path || '') + '</div>') + '</td>' +
    '<td><span class="cat">' + esc(r.category) + '</span></td>' +
    '<td>' + esc(r.purpose) + '</td>' +
    '<td>' + esc(r.scenario) + '</td>' +
    '<td class="example">' + esc(r.example) + '</td>' +
    '</tr>'
    );
  }).join('');
  empty.hidden = visible.length !== 0;
}
